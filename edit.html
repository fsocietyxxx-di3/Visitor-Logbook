<!-- edit.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Visitor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body id="edit-visitor-page">
    <script>
        // Apply theme immediately
        const preferredTheme = localStorage.getItem('themePreference');
        if (preferredTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="main-wrapper">
        <div class="sidebar">
            <h1 class="logo">LOGBOOK</h1>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
                <li><a href="add.html"><i class="fas fa-user-plus"></i> <span>Add Visitor</span></a></li>
            </ul>
        </div>

        <div class="backdrop"></div>

        <div class="main-content">
            <div class="top-navbar">
                <button class="hamburger"><i class="fas fa-bars"></i></button>
                <div class="system-name">EDIT VISITOR</div>
                <button id="theme-toggle">
                    <i class="bi bi-moon-fill"></i>
                    <i class="bi bi-sun-fill"></i>
                </button>
            </div>

            <main class="main-container">
                <h1 class="page-title">Edit Visitor</h1>

                <div id="error-message">Visitor not found. The record may have been deleted.</div>

                <div class="form-container">
                    <form id="edit-visitor-form" class="form-grid" novalidate>
                       <div class="form-group">
                            <label for="visitor-id">Visitor ID</label>
                            <input type="text" id="visitor-id" name="id" class="form-control" readonly>
                        </div>
                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" name="name" class="form-control" required>
                            <span class="validation-error">This field is required.</span>
                        </div>
                        <div class="form-group">
                            <label for="purpose">Purpose of Visit</label>
                            <input type="text" id="purpose" name="purpose" class="form-control" required>
                             <span class="validation-error">This field is required.</span>
                        </div>
                        <div class="form-group">
                            <label for="host">Person to Meet (Host)</label>
                            <input type="text" id="host" name="host" class="form-control" required>
                             <span class="validation-error">This field is required.</span>
                        </div>
                        <div class="form-group">
                            <label for="contact">Contact Number</label>
                            <input type="tel" id="contact" name="contact" class="form-control" required>
                             <span class="validation-error">This field is required.</span>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" name="date" class="form-control" required>
                             <span class="validation-error">This field is required.</span>
                        </div>
                        <div class="form-group">
                            <label for="time-in">Time In</label>
                            <input type="time" id="time-in" name="time_in" class="form-control" required>
                             <span class="validation-error">This field is required.</span>
                        </div>
                        <div class="form-group">
                            <label for="time-out">Time Out</label>
                            <input type="time" id="time-out" name="time_out" class="form-control">
                        </div>
                         <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status" name="status" class="form-control" required>
                                <option value="Pending">Pending</option>
                                <option value="Active">Active</option>
                                <option value="Completed">Completed</option>
                            </select>
                             <span class="validation-error">This field is required.</span>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" id="cancel-btn" class="btn">Cancel</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
